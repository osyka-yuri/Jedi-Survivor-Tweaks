; ==============================================================================
; Jedi Survivor Tweaks Configuration
; ==============================================================================
; Place this file next to the DLL/ASI plugin.
; Lines starting with ";" are comments and are ignored.
;
; Boolean values: true / false (also accepts yes/no, 1/0, case-insensitive)
; Float values:  use a dot as decimal separator (e.g., 1.0)


; ==============================================================================
; UI & DISPLAY
; ==============================================================================

[AspectRatioUIFix]
; Workaround for broken UI scaling on 16:10 displays. The game passes 1.111
; (its 16:10 aspect constant) into a UI scale formula (value / 1.5 = 0.740);
; replacing it with 1.0 gives a better result (1.0 / 1.5 = 0.667). On 16:9
; the game already uses 1.0, so the hook is a no-op there.
;   Default = 1.0  (best available result for 16:10)
;   Range   = 1.0 – 1.111  (1.111 = revert to game behaviour)
Enabled = false
Multiplier = 1.0

[LetterboxPillarboxFix]
; Removes pillarboxing / letterboxing in cutscenes by disabling forced aspect
; ratio constraints.
Enabled = true


; ==============================================================================
; GAMEPLAY
; ==============================================================================

[GameplayFOV]
; Multiplier for the gameplay field of view.
;   Default = 1.0 (no change)
;   Range   = 0.0 – 10.0
;   Presets: 0 = narrowest | 0.5 = narrower | 1 = default | 1.5 = wider | 2 = widest
Enabled = false
Multiplier = 1.0

[CameraDistance]
; Multiplier for the gameplay camera distance.
;   Default = 1.0 (no change)
;   Range   = 0.0 – 10.0
Enabled = false
Multiplier = 1.0


; ==============================================================================
; GRAPHICS
; ==============================================================================

[GraphicalTweaks]
; Master switch for the graphical tweaks below (sharpening, chromatic
; aberration, and vignette). If disabled, the individual sections are ignored.
Enabled = true

[Sharpening]
; Overrides the sharpening strength (UE CVar: r.Tonemapper.Sharpen).
;   Default = 1.0 (game CVar default is 0.0)
;   Range   = 0.0 – 10.0
;   Set to 0.0 to fully disable sharpening.
Enabled = true
Strength = 1.0

[ChromaticAberration]
; Toggles chromatic aberration (UE CVar: r.SceneColorFringeQuality).
;   Default = enabled (game default)
;   Set Enabled = false to disable.
Enabled = false

[Vignette]
; Toggles vignetting (UE CVar: r.Tonemapper.Quality).
;   Default = enabled (game default)
;   Set Enabled = false to disable.
Enabled = true


; ==============================================================================
; PERFORMANCE
; ==============================================================================

[InterpolatedRendering]
; Enables frame interpolation to reduce CPU stutters and camera jitters
; (UE CVar: respawn.InterpolatedRendering). Generally safe to leave enabled.
Enabled = true


; ==============================================================================
; ADVANCED
; ==============================================================================

[CVars]
; Custom Unreal Engine Console Variable (CVar) overrides.
; Format:  CVarName = Value
; Types:   float (e.g. 1.0), integer (e.g. 0), or boolean (true/false)
;
; Examples (remove the leading ";" to activate):
; r.VSync = 0
; r.D3D12.UseAllowTearing = 1
