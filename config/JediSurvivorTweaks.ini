; ==============================================================================
; Jedi Survivor Tweaks Configuration
; ==============================================================================
; Place this file next to the DLL/ASI plugin.
; Lines starting with ";" are comments and are ignored.
;
; Boolean values: true / false (also accepts yes/no, 1/0, case-insensitive)
; Float values:  use a dot as decimal separator (e.g., 1.0)

; ==============================================================================
; UI & DISPLAY
; ==============================================================================

[AspectRatioUIFix]
; Scales the in-game HUD, 3D map markers, and menus. The game derives its UI
; scale from render height, making 16:10 UI 10/9 larger than its 16:9
; equivalent. A multiplier of 0.9 (= 9/10) corrects that difference at every
; 16:10 resolution; 1.0 leaves the game scale unchanged.
; Opt-in: on 16:9 leave it disabled or at 1.0.
;   Default = 0.9
;   Range   = 0.5 – 1.5
Enabled = false
Multiplier = 0.9

[LetterboxPillarboxFix]
; Removes pillarboxing / letterboxing in cutscenes by disabling forced aspect
; ratio constraints.
Enabled = true


; ==============================================================================
; GAMEPLAY
; ==============================================================================

[GameplayFOV]
; Multiplier for the gameplay field of view.
;   Default = 1.0 (no change)
;   Range   = 0.0 – 10.0
;   Presets: 0 = narrowest | 0.5 = narrower | 1 = default | 1.5 = wider | 2 = widest
Enabled = false
Multiplier = 1.0

[CameraDistance]
; Multiplier for the gameplay camera distance.
;   Default = 1.0 (no change)
;   Range   = 0.0 – 10.0
Enabled = false
Multiplier = 1.0


; ==============================================================================
; GRAPHICS
; ==============================================================================

[GraphicalTweaks]
; Master switch for the graphical tweaks below (sharpening, chromatic
; aberration, and vignette). If disabled, the individual sections are ignored.
Enabled = true

[Sharpening]
; Overrides the sharpening strength (UE CVar: r.Tonemapper.Sharpen).
;   Default = 1.0 (game CVar default is 0.0)
;   Range   = 0.0 – 10.0
;   Set to 0.0 to fully disable sharpening.
Enabled = true
Strength = 1.0

[ChromaticAberration]
; Toggles chromatic aberration (UE CVar: r.SceneColorFringeQuality).
;   Default = enabled (game default)
;   Set Enabled = false to disable.
Enabled = false

[Vignette]
; Toggles vignetting (UE CVar: r.Tonemapper.Quality).
;   Default = enabled (game default)
;   Set Enabled = false to disable.
Enabled = true


; ==============================================================================
; PERFORMANCE
; ==============================================================================

[InterpolatedRendering]
; Enables frame interpolation to reduce CPU stutters and camera jitters
; (UE CVar: respawn.InterpolatedRendering). Generally safe to leave enabled.
Enabled = true

[StreamingPoolFix]
; Caps the game's streaming memory pool so VRAM does not grow without bound
; during long play sessions (a known leak in the stock game). Safe to leave on.
;
; PoolSizeGB:
;   auto  — freeze a valid engine size (recommended); falls back after roughly
;           30 seconds if no valid size is observed. The fallback is 2.0 GiB,
;           or lower on a GPU whose safe maximum is below 2.0 GiB.
;   2.0   — lock to a fixed size in GiB. The historical PoolSizeGB key name is
;           retained for compatibility. On a detected dedicated GPU, every
;           lock is limited to 70% of its physical VRAM (0.5 GiB minimum).
;           If the game GPU cannot be identified, the compatible 12.0 GiB
;           ceiling is used and this is reported in the log/overlay.
;
;   Default = auto
Enabled = true
PoolSizeGB = auto


[CVars]
; Custom Unreal Engine Console Variable (CVar) overrides.
; Format:  CVarName = Value
; Types:   float (e.g. 1.0), integer (e.g. 0), or boolean (true/false)
;
; Examples (remove the leading ";" to activate):
; r.VSync = 0
; r.D3D12.UseAllowTearing = 1
