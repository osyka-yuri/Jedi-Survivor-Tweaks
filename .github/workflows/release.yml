name: Release

on:
  push:
    tags:
      - 'v*'

# The release step creates a tag/release via the GITHUB_TOKEN, which requires
# write access to repo contents. Declaring it explicitly avoids failures on
# repos whose default token permissions are locked down to read-only.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Build ASI (Release|x64)
      run: msbuild JediSurvivorTweaks.sln /p:Configuration=Release /p:Platform=x64 /t:Rebuild

    - name: Build ReShade Addon (ReleaseAddon|x64)
      run: msbuild JediSurvivorTweaks.sln /p:Configuration=ReleaseAddon /p:Platform=x64 /t:Rebuild

    - name: Create ASI zip
      run: |
        $version = $env:GITHUB_REF_NAME
        mkdir asi_zip
        cp x64/Release/JediSurvivorTweaks.asi asi_zip/
        cp config/JediSurvivorTweaks.ini asi_zip/
        Compress-Archive -Path asi_zip/* -DestinationPath JediSurvivorTweaks_${version}_ASI.zip

    - name: Create ReShade Addon zip
      run: |
        $version = $env:GITHUB_REF_NAME
        mkdir addon_zip
        cp x64/ReleaseAddon/JediSurvivorTweaks.addon64 addon_zip/
        cp config/JediSurvivorTweaks.ini addon_zip/
        Compress-Archive -Path addon_zip/* -DestinationPath JediSurvivorTweaks_${version}_ReShadeAddon.zip

    - name: Extract Changelog
      id: extract_changelog
      run: |
        $version = $env:GITHUB_REF_NAME
        # Remove 'v' prefix if we want just the number, but our changelog uses e.g. [1.1.4]
        $versionNumber = $version -replace '^v', ''
        
        $changelog = Get-Content CHANGELOG.md -Raw
        
        # Regex to match the section for the specific version
        $pattern = "(?s)## \[$versionNumber\] - .*?(?=## \[|\Z)"
        
        if ($changelog -match $pattern) {
          $releaseNotes = $matches[0]
        } else {
          $releaseNotes = "No release notes found for $versionNumber"
        }
        
        $releaseNotes | Out-File -FilePath release_notes.txt -Encoding utf8
        echo "notes_file=release_notes.txt" >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        body_path: ${{ steps.extract_changelog.outputs.notes_file }}
        files: |
          JediSurvivorTweaks_*_ASI.zip
          JediSurvivorTweaks_*_ReShadeAddon.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
