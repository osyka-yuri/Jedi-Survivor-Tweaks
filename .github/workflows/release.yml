name: Release

on:
  push:
    tags:
      - 'v*'

# The release step creates a tag/release via the GITHUB_TOKEN, which requires
# write access to repo contents. Declaring it explicitly avoids failures on
# repos whose default token permissions are locked down to read-only.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Validate release metadata
      id: release_metadata
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $version = $env:GITHUB_REF_NAME
        if ($version -notmatch '^v(?<number>\d+\.\d+\.\d+)$') {
          throw "Release tag '$version' must use the vMAJOR.MINOR.PATCH format."
        }

        $versionNumber = $Matches.number
        $changelog = Get-Content CHANGELOG.md -Raw
        $escapedVersion = [regex]::Escape($versionNumber)
        $pattern = "(?ms)^## \[$escapedVersion\] - \d{4}-\d{2}-\d{2}\r?\n.*?(?=^## \[|\z)"
        $releaseSection = [regex]::Match($changelog, $pattern)
        if (-not $releaseSection.Success) {
          throw "CHANGELOG.md has no dated section for $version."
        }

        $releaseSection.Value.TrimEnd() | Set-Content release_notes.txt -Encoding utf8
        "notes_file=release_notes.txt" >> $env:GITHUB_OUTPUT

    - name: Build ASI (Release|x64)
      run: msbuild JediSurvivorTweaks.sln /p:Configuration=Release /p:Platform=x64 /t:Rebuild

    - name: Test ASI configuration
      shell: pwsh
      run: |
        & .\x64\Release\tests\JediSurvivorTweaks.Tests.exe
        if ($LASTEXITCODE -ne 0) { throw "Release tests failed with exit code $LASTEXITCODE." }

    - name: Build ReShade Addon (ReleaseAddon|x64)
      run: msbuild JediSurvivorTweaks.sln /p:Configuration=ReleaseAddon /p:Platform=x64 /t:Rebuild

    - name: Test ReShade Addon configuration
      shell: pwsh
      run: |
        & .\x64\ReleaseAddon\tests\JediSurvivorTweaks.Tests.exe
        if ($LASTEXITCODE -ne 0) { throw "ReleaseAddon tests failed with exit code $LASTEXITCODE." }

    - name: Create ASI zip
      run: |
        $version = $env:GITHUB_REF_NAME
        mkdir asi_zip
        cp x64/Release/JediSurvivorTweaks.asi asi_zip/
        cp config/JediSurvivorTweaks.ini asi_zip/
        Compress-Archive -Path asi_zip/* -DestinationPath JediSurvivorTweaks_${version}_ASI.zip

    - name: Create ReShade Addon zip
      run: |
        $version = $env:GITHUB_REF_NAME
        mkdir addon_zip
        cp x64/ReleaseAddon/JediSurvivorTweaks.addon64 addon_zip/
        cp config/JediSurvivorTweaks.ini addon_zip/
        Compress-Archive -Path addon_zip/* -DestinationPath JediSurvivorTweaks_${version}_ReShadeAddon.zip

    - name: Create checksums
      shell: pwsh
      run: |
        Get-ChildItem JediSurvivorTweaks_*.zip |
          Sort-Object Name |
          ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content SHA256SUMS.txt -Encoding ascii

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        body_path: ${{ steps.release_metadata.outputs.notes_file }}
        files: |
          JediSurvivorTweaks_*_ASI.zip
          JediSurvivorTweaks_*_ReShadeAddon.zip
          SHA256SUMS.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
